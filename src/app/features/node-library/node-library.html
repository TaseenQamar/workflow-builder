<div class="flex h-full flex-col overflow-hidden">
  <header class="flex shrink-0 flex-wrap items-center justify-between gap-3 border-b border-[#EFE8E1] bg-white/70 px-4 py-4 backdrop-blur sm:px-8 sm:py-6">
    <div>
      <h1 class="text-xl font-bold text-[#1A1A1A] sm:text-2xl">Node Library</h1>
      <p class="mt-1 text-sm text-[#757575]">
        All available nodes — drag them from the palette in Workflow Editor
      </p>
    </div>
    <a
      routerLink="/workflow-editor"
      class="rounded-full bg-[#F06225] px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-[#E5551A]"
    >
      Open Editor
    </a>
  </header>

  <div class="min-h-0 flex-1 overflow-y-auto overscroll-contain p-4 sm:p-8">
    @for (group of grouped; track group.name) {
      <section class="mb-10">
        <h2 class="text-lg font-bold text-[#1A1A1A]">{{ group.name }}</h2>
        <div class="mt-4 grid gap-4 sm:grid-cols-2 xl:grid-cols-4">
          @for (node of group.nodes; track node.label) {
            <a
              routerLink="/workflow-editor"
              class="rounded-3xl border border-[#EFE8E1] bg-white p-4 text-left shadow-[0_4px_24px_rgba(26,26,26,0.04)] transition hover:border-[#FFD0B8] hover:bg-[#FFF8F4]"
            >
              <span class="text-2xl">{{ node.icon }}</span>
              <p class="mt-3 font-semibold text-[#1A1A1A]">{{ node.label }}</p>
              <p class="mt-1 text-sm text-[#757575]">{{ node.description }}</p>
              <p class="mt-2 text-xs font-medium text-[#F06225]">type: {{ node.type }}</p>
            </a>
          }
        </div>
      </section>
    }
  </div>
</div>
