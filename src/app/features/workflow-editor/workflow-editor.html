<div class="flex h-full flex-col overflow-hidden">
  <header class="flex items-center justify-between border-b border-[#EFE8E1] bg-white/70 px-6 py-4 backdrop-blur">
    <div>
      <div class="flex items-center gap-2">
        <a routerLink="/dashboard" class="text-[#9A9A9A] hover:text-[#4A4A4A]">←</a>
        <h1 class="text-xl font-semibold text-[#1A1A1A]">{{ store.workflowName() }}</h1>
      </div>
      <p class="text-sm text-[#757575]">Connect wires (Chat→HTTP→AI) · type a prompt below · click Chat · saves to PostgreSQL</p>
    </div>
    <div class="flex items-center gap-2">
      <a
        routerLink="/settings"
        class="rounded-lg border border-[#E5DDD4] px-3 py-2 text-sm text-[#4A4A4A] transition hover:bg-[#FFF8F4]"
      >
        API Key
      </a>
      <button
        type="button"
        class="rounded-lg bg-[#F06225] px-4 py-2 text-sm font-medium text-white transition hover:bg-[#E5551A] disabled:opacity-50"
        [disabled]="store.saving()"
        (click)="save()"
      >
        {{ store.saving() ? 'Saving...' : 'Save' }}
      </button>
    </div>
  </header>

  @if (store.message()) {
    <div class="border-b border-emerald-200 bg-emerald-50 px-6 py-2 text-sm text-emerald-700">
      {{ store.message() }}
    </div>
  }
  @if (store.error()) {
    <div class="border-b border-red-200 bg-red-50 px-6 py-2 text-sm text-red-600">
      {{ store.error() }}
    </div>
  }

  <div class="flex flex-1 overflow-hidden">
    <aside class="w-56 shrink-0 overflow-y-auto border-r border-[#EFE8E1] bg-white/70 p-4">
      <app-node-palette />
    </aside>

    <div class="relative min-w-0 flex-1 overflow-hidden">
      <app-workflow-canvas />
    </div>

    <aside class="w-80 shrink-0 overflow-y-auto border-l border-[#EFE8E1] bg-white/70 p-4">
      <app-properties-panel (runChat)="sendChat()" />
    </aside>
  </div>

  <app-chat-panel
    [messages]="store.chatMessages()"
    [running]="store.running()"
    [inputText]="store.chatInput()"
    [highlight]="store.chatPanelHighlight()"
    (inputTextChange)="store.chatInput.set($event)"
    (send)="sendChat()"
  />
</div>
