<div class="flex h-full min-h-0 flex-col overflow-hidden">
  <header
    class="flex shrink-0 flex-wrap items-center justify-between gap-3 border-b border-[#D9E5E3] bg-white/70 px-4 py-3 backdrop-blur sm:px-6 sm:py-4"
  >
    <div class="min-w-0 flex-1">
      <div class="flex items-center gap-2">
        <a routerLink="/dashboard" class="shrink-0 text-[#9A9A9A] hover:text-[#4A4A4A]">←</a>
        <h1 class="truncate text-lg font-semibold text-[#1A1A1A] sm:text-xl">
          {{ store.workflowName() }}
        </h1>
      </div>
      <p class="mt-0.5 hidden text-sm text-[#757575] sm:block">
        Connect wires (Chat→HTTP→AI) · type a prompt below · click Chat
      </p>
    </div>

    <div class="flex flex-wrap items-center gap-2">
      <button
        type="button"
        class="rounded-lg border border-[#CDDBD9] px-3 py-2 text-xs font-medium text-[#4A4A4A] transition hover:bg-[#F5FBFA] lg:hidden"
        [class.bg-[#E6F7F6]]="showPalette()"
        [class.border-[#9FE0DC]]="showPalette()"
        [class.text-[#2BBFBA]]="showPalette()"
        (click)="togglePalette()"
      >
        Nodes
      </button>
      <button
        type="button"
        class="rounded-lg border border-[#CDDBD9] px-3 py-2 text-xs font-medium text-[#4A4A4A] transition hover:bg-[#F5FBFA] lg:hidden"
        [class.bg-[#E6F7F6]]="showProps()"
        [class.border-[#9FE0DC]]="showProps()"
        [class.text-[#2BBFBA]]="showProps()"
        (click)="toggleProps()"
      >
        Props
      </button>
      <a
        routerLink="/settings"
        class="rounded-lg border border-[#CDDBD9] px-3 py-2 text-sm text-[#4A4A4A] transition hover:bg-[#F5FBFA]"
      >
        API Key
      </a>
      <button
        type="button"
        class="rounded-lg bg-[#2BBFBA] px-4 py-2 text-sm font-medium text-white transition hover:bg-[#1FA8A3] disabled:opacity-50"
        [disabled]="store.saving()"
        (click)="save()"
      >
        {{ store.saving() ? 'Saving...' : 'Save' }}
      </button>
    </div>
  </header>

  @if (store.message()) {
    <div class="shrink-0 border-b border-emerald-200 bg-emerald-50 px-4 py-2 text-sm text-emerald-700 sm:px-6">
      {{ store.message() }}
    </div>
  }
  @if (store.error()) {
    <div class="shrink-0 border-b border-red-200 bg-red-50 px-4 py-2 text-sm text-red-600 sm:px-6">
      {{ store.error() }}
    </div>
  }

  <div class="relative flex min-h-0 flex-1 overflow-hidden">
    <!-- Node palette -->
    <aside
      class="absolute inset-y-0 left-0 z-20 w-[min(16rem,85vw)] overflow-y-auto overscroll-contain border-r border-[#D9E5E3] bg-white p-4 shadow-lg transition-transform duration-200 lg:static lg:z-auto lg:w-56 lg:translate-x-0 lg:shadow-none"
      [class.-translate-x-full]="!showPalette()"
      [class.translate-x-0]="showPalette()"
    >
      <div class="mb-3 flex items-center justify-between lg:hidden">
        <p class="text-xs font-semibold uppercase tracking-wide text-[#9A9A9A]">Nodes</p>
        <button type="button" class="text-[#757575]" (click)="showPalette.set(false)">✕</button>
      </div>
      <app-node-palette />
    </aside>

    <!-- Canvas -->
    <div class="relative min-w-0 flex-1 overflow-hidden bg-[#F4FAF9]">
      <app-workflow-canvas />
    </div>

    <!-- Properties -->
    <aside
      class="absolute inset-y-0 right-0 z-20 w-[min(20rem,90vw)] overflow-y-auto overscroll-contain border-l border-[#D9E5E3] bg-white p-4 shadow-lg transition-transform duration-200 lg:static lg:z-auto lg:w-80 lg:translate-x-0 lg:shadow-none"
      [class.translate-x-full]="!showProps()"
      [class.translate-x-0]="showProps()"
    >
      <div class="mb-3 flex items-center justify-between lg:hidden">
        <p class="text-xs font-semibold uppercase tracking-wide text-[#9A9A9A]">Properties</p>
        <button type="button" class="text-[#757575]" (click)="showProps.set(false)">✕</button>
      </div>
      <app-properties-panel (runChat)="sendChat()" />
    </aside>

    <!-- Mobile panel backdrop -->
    @if (showPalette() || showProps()) {
      <button
        type="button"
        class="absolute inset-0 z-10 bg-black/30 lg:hidden"
        aria-label="Close panels"
        (click)="closePanels()"
      ></button>
    }
  </div>

  <div class="shrink-0">
    <app-chat-panel
      [messages]="store.chatMessages()"
      [running]="store.running()"
      [inputText]="store.chatInput()"
      [highlight]="store.chatPanelHighlight()"
      (inputTextChange)="store.chatInput.set($event)"
      (send)="sendChat()"
      (newChat)="newChat()"
    />
  </div>
</div>
