<div class="flex h-screen overflow-hidden bg-[#FCF9F6]">
  <aside class="flex w-64 shrink-0 flex-col border-r border-[#EFE8E1] bg-white">
    <div class="border-b border-[#EFE8E1] px-5 py-5">
      <div class="flex items-center gap-3">
        <div
          class="flex h-10 w-10 items-center justify-center rounded-2xl bg-[#F06225] text-sm font-bold text-white shadow-sm"
        >
          WB
        </div>
        <div>
          <p class="text-sm font-bold text-[#1A1A1A]">{{ appName() }}</p>
          <p class="text-xs text-[#757575]">Visual automation</p>
        </div>
      </div>
    </div>

    <nav class="flex-1 space-y-1 overflow-y-auto p-3">
      @for (item of navItems(); track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-[#FFF2EB] text-[#F06225] border-[#FFD0B8]"
          class="group flex items-start gap-3 rounded-2xl border border-transparent px-3 py-2.5 text-[#757575] transition hover:bg-[#FFF5F0] hover:text-[#1A1A1A]"
        >
          <span class="mt-0.5 text-base leading-none">{{ item.icon }}</span>
          <span>
            <span class="block text-sm font-semibold">{{ item.label }}</span>
            <span class="block text-xs text-[#9A9A9A] group-hover:text-[#757575]">
              {{ item.description }}
            </span>
          </span>
        </a>
      }
    </nav>

    <div class="border-t border-[#EFE8E1] p-4">
      <div class="rounded-3xl bg-gradient-to-br from-[#F06225] to-[#C94512] p-4 text-white shadow-md">
        <p class="text-sm font-bold">Build faster</p>
        <p class="mt-1 text-xs text-white/80">Create & run AI workflows visually</p>
        <a
          routerLink="/workflow-editor"
          class="mt-3 block w-full rounded-full bg-white px-4 py-2 text-center text-sm font-semibold text-[#F06225] transition hover:bg-[#FFF2EB]"
        >
          + New Workflow
        </a>
      </div>
    </div>
  </aside>

  <main class="flex min-w-0 flex-1 flex-col overflow-hidden bg-[#FCF9F6]">
    <router-outlet />
  </main>
</div>
