<div class="flex h-screen overflow-hidden bg-slate-950">
  <aside class="flex w-64 shrink-0 flex-col border-r border-slate-800 bg-slate-900">
    <div class="border-b border-slate-800 px-5 py-5">
      <div class="flex items-center gap-3">
        <div
          class="flex h-9 w-9 items-center justify-center rounded-lg bg-indigo-600 text-sm font-bold text-white"
        >
          WB
        </div>
        <div>
          <p class="text-sm font-semibold text-white">{{ appName() }}</p>
          <p class="text-xs text-slate-400">Visual automation</p>
        </div>
      </div>
    </div>

    <nav class="flex-1 space-y-1 overflow-y-auto p-3">
      @for (item of navItems(); track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-indigo-600/20 text-indigo-300 border-indigo-500/40"
          class="group flex items-start gap-3 rounded-lg border border-transparent px-3 py-2.5 text-slate-300 transition hover:bg-slate-800 hover:text-white"
        >
          <span class="mt-0.5 text-base leading-none">{{ item.icon }}</span>
          <span>
            <span class="block text-sm font-medium">{{ item.label }}</span>
            <span class="block text-xs text-slate-500 group-hover:text-slate-400">
              {{ item.description }}
            </span>
          </span>
        </a>
      }
    </nav>

    <div class="border-t border-slate-800 p-4">
      <button
        type="button"
        class="w-full rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-medium text-white transition hover:bg-indigo-500"
      >
        + New Workflow
      </button>
    </div>
  </aside>

  <main class="flex min-w-0 flex-1 flex-col overflow-hidden">
    <router-outlet />
  </main>
</div>
