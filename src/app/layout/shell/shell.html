<div class="flex h-dvh max-h-dvh overflow-hidden bg-[#FCF9F6]">
  <!-- Mobile top bar -->
  <div
    class="fixed inset-x-0 top-0 z-[60] flex h-14 items-center gap-3 border-b border-[#EFE8E1] bg-white px-4 lg:hidden"
  >
    <button
      type="button"
      class="flex h-10 w-10 items-center justify-center rounded-xl border border-[#EFE8E1] text-[#1A1A1A] hover:bg-[#FFF5F0]"
      (click)="toggleSidebar()"
      [attr.aria-expanded]="sidebarOpen()"
      aria-label="Toggle navigation menu"
    >
      @if (sidebarOpen()) {
        <span class="text-lg leading-none">✕</span>
      } @else {
        <span class="text-lg leading-none">☰</span>
      }
    </button>
    <div class="flex items-center gap-2 min-w-0">
      <div
        class="flex h-8 w-8 shrink-0 items-center justify-center rounded-xl bg-[#F06225] text-xs font-bold text-white"
      >
        WB
      </div>
      <p class="truncate text-sm font-bold text-[#1A1A1A]">{{ appName() }}</p>
    </div>
  </div>

  <!-- Backdrop (mobile) -->
  @if (sidebarOpen() && !isDesktop()) {
    <button
      type="button"
      class="fixed inset-0 z-40 bg-black/40 lg:hidden"
      aria-label="Close menu"
      (click)="closeSidebar()"
    ></button>
  }

  <!-- Sidebar -->
  <aside
    class="fixed inset-y-0 left-0 z-50 flex w-[min(18rem,85vw)] flex-col border-r border-[#EFE8E1] bg-white transition-transform duration-200 ease-out lg:static lg:z-auto lg:w-64 lg:translate-x-0 lg:shrink-0"
    [class.-translate-x-full]="!isDesktop() && !sidebarOpen()"
    [class.translate-x-0]="isDesktop() || sidebarOpen()"
  >
    <div class="hidden border-b border-[#EFE8E1] px-5 py-5 lg:block">
      <div class="flex items-center gap-3">
        <div
          class="flex h-10 w-10 items-center justify-center rounded-2xl bg-[#F06225] text-sm font-bold text-white shadow-sm"
        >
          WB
        </div>
        <div>
          <p class="text-sm font-bold text-[#1A1A1A]">{{ appName() }}</p>
          <p class="text-xs text-[#757575]">Visual automation</p>
        </div>
      </div>
    </div>

    <!-- Spacer under mobile top bar -->
    <div class="h-14 shrink-0 lg:hidden"></div>

    <nav class="min-h-0 flex-1 space-y-1 overflow-y-auto overscroll-contain p-3">
      @for (item of navItems(); track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-[#FFF2EB] text-[#F06225] border-[#FFD0B8]"
          class="group flex items-start gap-3 rounded-2xl border border-transparent px-3 py-2.5 text-[#757575] transition hover:bg-[#FFF5F0] hover:text-[#1A1A1A]"
          (click)="closeSidebar()"
        >
          <span class="mt-0.5 text-base leading-none">{{ item.icon }}</span>
          <span class="min-w-0">
            <span class="block text-sm font-semibold">{{ item.label }}</span>
            <span class="block text-xs text-[#9A9A9A] group-hover:text-[#757575]">
              {{ item.description }}
            </span>
          </span>
        </a>
      }
    </nav>

    <div class="shrink-0 border-t border-[#EFE8E1] p-4">
      <div class="rounded-3xl bg-gradient-to-br from-[#F06225] to-[#C94512] p-4 text-white shadow-md">
        <p class="text-sm font-bold">Build faster</p>
        <p class="mt-1 text-xs text-white/80">Create & run AI workflows visually</p>
        <a
          routerLink="/workflow-editor"
          class="mt-3 block w-full rounded-full bg-white px-4 py-2 text-center text-sm font-semibold text-[#F06225] transition hover:bg-[#FFF2EB]"
          (click)="closeSidebar()"
        >
          + New Workflow
        </a>
      </div>
    </div>
  </aside>

  <main class="flex min-h-0 min-w-0 flex-1 flex-col overflow-hidden pt-14 lg:pt-0">
    <div class="page-host flex min-h-0 flex-1 flex-col overflow-hidden">
      <router-outlet />
    </div>
  </main>
</div>
